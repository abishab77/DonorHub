<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sign.css">
</head>
<body>
    <div class="form-container">
  <p class="title">Login</p>
  <form class="form" id="login-form">
    <div class="input-group">
      <label for="email">Email</label>
      <input placeholder="Enter your email" id="email" name="email" type="email" required />
      
      <label for="password">Password</label>
      <input placeholder="Enter your password" id="password" name="password" type="password" required />
    </div>
    <button style="margin-top:6%;" class="button" type="submit">Login</button>
  </form>
  <div class="social-message">
    <div class="line"></div>
    <p class="message">Don't have an account?<a href="signup.html">Sign up</a></p>
    <div class="line"></div>
  </div>
</div>

<script>
  const loginForm = document.getElementById('login-form');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const response = await fetch('http://localhost:5000/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ email, password }),
      });

      const data = await response.json();
      if (response.ok) {
        alert(data.message); // Success message
      } else {
        alert(data.message); // Error message
      }
    } catch (error) {
      console.error('Error:', error);
      alert('An error occurred. Please try again.');
    }
  });
</script>

</body>
</html>
