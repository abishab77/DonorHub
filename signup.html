<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Signup Form</title>
    <link rel="stylesheet" href="sign.css">

    <style>
        .form-container {
            max-width: 90%;
            width: 340px;
            border-radius: 0.75rem;
            background-color: rgba(17, 24, 39, 1);
            padding: 2rem;
            color: rgba(243, 244, 246, 1);
            margin: 0 auto;
        }

        .title {
            text-align: center;
            font-size: 1.5rem;
            line-height: 2rem;
            font-weight: 700;
        }

        .form {
            margin-top: 1.5rem;
        }

        .input-group {
            margin-top: 1rem;
        }

        .input-group label {
            display: block;
            color: rgba(156, 163, 175, 1);
            margin: 5px 0;
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            border-radius: 0.375rem;
            border: 1px solid rgba(55, 65, 81, 1);
            outline: 0;
            background-color: rgba(17, 24, 39, 1);
            padding: 0.5rem 0.5rem;
            color: rgba(243, 244, 246, 1);
        }

        .input-group input:focus {
            border-color: rgba(167, 139, 250);
        }

        .error-message {
            color: red;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .button {
            display: block;
            width: 105%;
            background-color: rgba(167, 139, 250, 1);
            padding: 0.5rem 0.5rem;
            text-align: center;
            color: rgba(17, 24, 39, 1);
            border: none;
            border-radius: 0.375rem;
            font-weight: 600;
            margin-top: 4%;
        }

        .otp {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .otp input {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 18px;
            border: 1px solid rgba(55, 65, 81, 1);
            border-radius: 0.375rem;
            background-color: rgba(17, 24, 39, 1);
            color: rgba(243, 244, 246, 1);
        }

        a {
            color: rgba(167, 139, 250, 1);
            font-size: 18px;
        }

        a:hover {
            color: white;
        }

        @media (max-width: 500px) {
            .form-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="signup-form">
        <div class="form-container">
            <p class="title">Sign Up</p>
            <form class="form" id="signupForm">
                <div class="input-group">
                    <label for="username">Name</label>
                    <input placeholder="" id="username" name="username" type="text" />
                    <p class="error-message" id="usernameError"></p>
                </div>

                <div class="input-group">
                    <label for="age">Age</label>
                    <input placeholder="" id="age" name="age" type="number" />
                    <p class="error-message" id="ageError"></p>
                </div>

                <div class="input-group">
                    <label for="phone">Phone</label>
                    <input placeholder="" id="phone" name="phone" type="phone" />
                    <p class="error-message" id="phoneError"></p>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input placeholder="" id="email" name="email" type="email" />
                    <p class="error-message" id="emailError"></p>
                </div>

                <button type="button" class="button" onclick="sendOtp()">Send OTP</button>

                <div class="input-group">
                    <label for="otp">Enter OTP</label>
                    <div class="otp">
                        <input type="text" maxlength="1" id="otp1" />
                        <input type="text" maxlength="1" id="otp2" />
                        <input type="text" maxlength="1" id="otp3" />
                        <input type="text" maxlength="1" id="otp4" />
                        <input type="text" maxlength="1" id="otp5" />
                        <input type="text" maxlength="1" id="otp6" />
                    </div>
                    <p class="error-message" id="otpError"></p>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input placeholder="" id="password" name="password" type="password" />
                    <p class="error-message" id="passwordError"></p>
                </div>

                <div class="input-group">
                    <label for="confirmpassword">Confirm Password</label>
                    <input placeholder="" id="confirmpassword" name="confirmpassword" type="password" />
                    <p class="error-message" id="confirmpasswordError"></p>
                </div>

                <button type="button" class="button" onclick="validateForm()">Submit</button>
            </form>
        </div>
    </div>

    <script>


        function validateForm() {
            let isValid = true;

            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(e => e.textContent = "");

            // Validate Name
            const username = document.getElementById('username').value.trim();
            if (username === "") {
                document.getElementById('usernameError').textContent = "Name is required.";
                isValid = false;
            }

            // Validate Age
            const age = document.getElementById('age').value.trim();
            if (age === "" || isNaN(age) || age < 1) {
                document.getElementById('ageError').textContent = "Please enter a valid age.";
                isValid = false;
            }

            // Validate Phone
            const phone = document.getElementById('phone').value.trim();
            const phonePattern = /^[0-9]{10}$/;
            if (!phonePattern.test(phone)) {
                document.getElementById('phoneError').textContent = "Please enter a valid 10-digit phone number.";
                isValid = false;
            }

            // Validate Email
            const email = document.getElementById('email').value.trim();
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                document.getElementById('emailError').textContent = "Please enter a valid email address.";
                isValid = false;
            }

            // Validate OTP
            const otp = [
                document.getElementById('otp1').value,
                document.getElementById('otp2').value,
                document.getElementById('otp3').value,
                document.getElementById('otp4').value,
                document.getElementById('otp5').value,
                document.getElementById('otp6').value
            ].join('');
            if (otp.length !== 6 || isNaN(otp)) {
                document.getElementById('otpError').textContent = "Please enter a valid 6-digit OTP.";
                isValid = false;
            }

            // Validate Password
            const password = document.getElementById('password').value.trim();
            if (password.length < 6) {
                document.getElementById('passwordError').textContent = "Password must be at least 6 characters long.";
                isValid = false;
            }

            // Validate Confirm Password
            const confirmPassword = document.getElementById('confirmpassword').value.trim();
            if (confirmPassword !== password) {
                document.getElementById('confirmpasswordError').textContent = "Passwords do not match.";
                isValid = false;
            }

            if (isValid) {
                alert("Form submitted successfully!");
            }
        }

    </script>

</body>

</html>
